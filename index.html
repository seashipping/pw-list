<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>USER PW LIST V.22 - SMART COPY</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
    --neon-blue: #00d4ff;
    --neon-green: #00ffcc;
    --neon-red: #ff0055;
    --bg-dark: #0a0a0a;
    --panel-bg: #111111;
    --text-main: #e0e0e0;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif;background:var(--bg-dark);color:var(--text-main);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--bg-dark);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:var(--panel-bg);border:2px solid var(--neon-blue);border-radius:20px;padding:30px;text-align:center;max-width:400px;width:90%;box-shadow:0 0 30px rgba(0,212,255,0.2);}
.login-box h1{color:var(--neon-blue);font-size:1.4rem;margin-bottom:20px;}
.lf{margin-bottom:15px;text-align:left;}
.lf label{display:block;color:var(--neon-blue);font-size:0.7rem;font-weight:bold;margin-bottom:5px;}
.lf input{width:100%;padding:12px;border-radius:10px;border:2px solid var(--neon-blue);background:#000;color:var(--neon-blue);font-size:1rem;outline:none;}
.btn-login{width:100%;padding:14px;background:linear-gradient(90deg, var(--neon-blue), var(--neon-green));color:#000;border:none;border-radius:30px;font-size:1.1rem;font-weight:bold;cursor:pointer;margin-top:10px;}
.footer-neon{margin-top:20px;padding:12px;border:2px solid var(--neon-red);border-radius:15px;background:rgba(255,0,85,0.05);}
.footer-neon .line1{color:#fff !important;font-weight:bold;font-size:0.85rem;}
.footer-neon .line2{color:#fff !important;font-weight:bold;font-size:0.8rem;margin-top:5px;}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100%;}
header{background:var(--panel-bg);padding:10px 15px;border-bottom:2px solid var(--neon-blue);display:flex;justify-content:space-between;align-items:center;}
.header-title{color:var(--neon-blue);font-weight:bold;font-size:1rem;display:flex;flex-direction:column;gap:2px;}
.header-title .by{color:var(--neon-green);font-size:0.7rem;font-weight:bold;border:1px solid var(--neon-green);padding:1px 8px;border-radius:10px;width:fit-content;}
.company-badge{display:none;}
.btn-logout-pro{background:var(--neon-red);color:#fff;border:none;padding:6px 12px;border-radius:15px;font-size:0.8rem;font-weight:bold;cursor:pointer;}

/* ── PINNED LINKS ── */
.pinned-links{background:#000;padding:8px 15px;display:flex;gap:10px;align-items:center;border-bottom:1px solid rgba(0,212,255,0.1);overflow-x:auto;}
.pin-btn{padding:5px 12px;background:var(--panel-bg);border:1px solid var(--neon-green);color:var(--neon-green);border-radius:15px;font-size:0.75rem;text-decoration:none;font-weight:bold;white-space:nowrap;}

/* ── TOOLBAR ── */
.toolbar{background:#000;padding:10px 15px;display:flex;gap:10px;align-items:center;flex-wrap:nowrap;overflow-x:auto;border-bottom:1px solid rgba(0,212,255,0.1);}
.toolbar button{padding:8px 12px;border-radius:8px;border:1px solid #fff;background:#000;color:#fff;font-weight:bold;cursor:pointer;font-size:0.75rem;white-space:nowrap;}

/* ── TAB BUTTONS ── */
.tab-group{display:flex;gap:5px;margin:0 auto;}
.tab-btn-pro{padding:8px 12px;border-radius:8px;border:1px solid var(--neon-blue);background:#000;color:var(--neon-blue);font-weight:bold;cursor:pointer;font-size:0.75rem;}
.tab-btn-pro.active{color:#fff;background:rgba(0,212,255,0.1);border-color:#fff;}

/* ── SEARCH ── */
.search-container{padding:15px;background:#000;display:flex;flex-direction:column;gap:10px;}
.btn-add-main{width:100%;padding:12px;background:#000;color:var(--neon-green);border:1px solid var(--neon-green);border-radius:25px;font-weight:bold;cursor:pointer;text-transform:uppercase;font-size:0.85rem;}
.search-wrapper{position:relative;width:100%;}
.search-wrapper input{width:100%;padding:12px 15px 12px 40px;border-radius:25px;border:1px solid var(--neon-blue);background:var(--panel-bg);color:#fff;font-size:1rem;outline:none;}
.search-wrapper::before{content:'🔍';position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:1rem;opacity:0.8;}

/* ── DATA CONTAINER ── */
.data-container{flex:1;overflow-y:auto;padding:10px;background:#000;}

/* ── TABLE VIEW (PC ONLY) ── */
.table-view{display:none;width:100%;border-collapse:collapse;background:var(--panel-bg);border-radius:10px;overflow:hidden;}
.table-view th{background:#1a1a1a;color:var(--neon-blue);padding:12px;text-align:left;font-size:0.8rem;border-bottom:2px solid var(--neon-blue);text-transform:uppercase;}
.table-view td{padding:10px;border-bottom:1px solid #222;font-size:0.9rem;color:#eee;vertical-align:middle;}

/* ── CARD VIEW (MOBILE/TABLET) ── */
.card-list{display:grid;grid-template-columns:1fr;gap:15px;}
.data-card{background:var(--panel-bg);border:1px solid #333;border-radius:15px;padding:15px;box-shadow:0 4px 10px rgba(0,0,0,0.3);position:relative;border-left:4px solid var(--neon-blue);}
.card-header{font-size:1.1rem;font-weight:bold;color:#fff;margin-bottom:10px;border-bottom:1px solid #222;padding-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:0.9rem;}
.card-label{color:var(--neon-blue);font-weight:bold;font-size:0.75rem;text-transform:uppercase;}
.card-value{color:#eee;font-weight:500;display:flex;align-items:center;gap:8px;max-width:70%;}
.card-value span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-actions{display:flex;gap:10px;margin-top:15px;padding-top:10px;border-top:1px solid #222;}
.card-actions button{flex:1;padding:10px;border-radius:8px;border:none;font-weight:bold;font-size:0.8rem;cursor:pointer;}

/* ── BUTTON STYLES ── */
.copy-btn-sm{background:transparent;border:1px solid var(--neon-blue);color:var(--neon-blue);padding:4px 8px;border-radius:5px;font-size:0.7rem;cursor:pointer;}
.card-copy-btn{background:var(--neon-green) !important;color:#000 !important;font-weight:bold;padding:4px 12px;border-radius:15px;font-size:0.75rem;border:none;cursor:pointer;}
.btn-edit-sm{background:var(--neon-blue);color:#000;border:none;padding:4px 8px;border-radius:4px;font-size:0.7rem;font-weight:bold;cursor:pointer;}
.btn-del-sm{background:var(--neon-red);color:#fff;border:none;padding:4px 8px;border-radius:4px;font-size:0.7rem;font-weight:bold;cursor:pointer;}

/* ── MEDIA QUERIES ── */
@media (min-width: 1024px) {
    .header-title{font-size:1.3rem;flex-direction:row;align-items:center;}
    .header-title .by{font-size:0.85rem;padding:4px 15px;}
    .company-badge{display:block;}
    .search-container{flex-direction:row;padding:20px 25px;}
    .btn-add-main{width:auto;padding:14px 30px;}
    .table-view{display:table;}
    .card-list{display:none;}
    .toolbar{padding:15px 25px;overflow-x:visible;}
    .tab-btn-pro{padding:12px 22px;font-size:0.9rem;}
}

/* ── OTHERS ── */
#status-bar{padding:8px 15px;background:var(--panel-bg);border-bottom:1px solid rgba(0,212,255,0.1);font-size:0.8rem;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--neon-blue);color:#000;padding:12px 25px;border-radius:25px;display:none;z-index:2000;font-weight:bold;box-shadow:0 5px 15px rgba(0,0,0,0.5);}
.modal-content{width:95%;padding:20px;background:var(--panel-bg);border:2px solid var(--neon-blue);border-radius:15px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>🔐 USER PW LIST V.1</h1>
    <div id="login-err" style="color:var(--neon-red);margin-bottom:10px;font-size:0.85rem;font-weight:bold;"></div>
    <div class="lf"><label>USERNAME</label><input type="text" id="l-user" autocomplete="off"></div>
    <div class="lf">
      <label>PASSWORD</label>
      <div style="position:relative">
        <input type="password" id="l-pass">
        <button onclick="togglePass('l-pass')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--neon-blue);cursor:pointer;font-size:1.2rem;">👁️</button>
      </div>
    </div>
    <button class="btn-login" onclick="handleLogin()">LOGIN NOW</button>
    <div class="footer-neon"><div class="line1">SEA SHIPPING LLC</div><div class="line2">Release-July 2026</div></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-title">🔐 USER PW LIST V.1 <span class="by">By-Idris Mansoor</span></div>
    <div class="header-right">
      <div class="company-badge">© SEA SHIPPING LLC - 2026</div>
      <button class="btn-logout-pro" onclick="handleLogout()">Logout</button>
    </div>
  </header>

  <div class="pinned-links" id="pin-container"></div>

  <div class="toolbar">
    <button onclick="exportToExcel()">📤 Export</button>
    <button onclick="importFromExcel()">📥 Import</button>
    <button onclick="loadFromSheets()">🔄 Sync</button>
    <div class="tab-group">
      <button class="tab-btn-pro active" onclick="switchTab('pw')">PW</button>
      <button class="tab-btn-pro" onclick="switchTab('dm')">DM</button>
      <button class="tab-btn-pro" onclick="switchTab('import')">IMP</button>
      <button class="tab-btn-pro" onclick="switchTab('links')">LINK</button>
    </div>
  </div>

  <div id="status-bar"><div id="status-text">⏳ System Ready</div></div>

  <div class="search-container">
    <button class="btn-add-main" onclick="openModal('add-modal')">➕ Add New</button>
    <div class="search-wrapper"><input type="text" id="search-input" placeholder="Search..." oninput="renderData()"></div>
  </div>

  <div class="data-container">
    <table class="table-view" id="data-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="card-list" id="card-list"></div>
  </div>
</div>

<div id="add-modal" class="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
  <div class="modal-content">
    <h3 id="modal-title" style="color:var(--neon-blue);margin-bottom:15px;">Add Entry</h3>
    <div id="add-form-fields"></div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button style="flex:1;padding:12px;background:var(--neon-green);color:#000;border:none;border-radius:10px;font-weight:bold;cursor:pointer;" onclick="addEntry()">Save</button>
      <button style="flex:1;padding:12px;background:#333;color:#fff;border:none;border-radius:10px;font-weight:bold;cursor:pointer;" onclick="closeModal('add-modal')">Cancel</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".xlsx,.xls" style="display:none;" onchange="handleFileImport(event)">
<div id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzPPK40EUUUVrR9Ucm-TKnlaDYU47ipW3cYjeHT2PgJhHIxlGtjbDe3661rjJGi7Fcxnw/exec";
let rows = { pw: [], dm: [], import: [], links: [] };
let currentUser = null;
let currentTab = 'pw';
let editingIdx = -1;

async function handleLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value.trim();
  if(!u || !p) return;
  try {
    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: u, password: p }) });
    const result = await res.json();
    if(result.success) {
      currentUser = result.user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      loadFromSheets();
    } else { document.getElementById('login-err').innerText = "❌ " + result.error; }
  } catch(e) { alert("Error"); }
}

async function loadFromSheets() {
  setStatus("⏳ Loading...");
  try {
    const res = await fetch(API_URL);
    rows = await res.json();
    renderData();
    setStatus(`✅ Loaded ${rows[currentTab].length} entries.`);
  } catch(e) { setStatus("❌ Error"); }
}

async function saveToSheets() {
  setStatus("⏳ Saving...");
  try {
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'save', rows: rows, username: currentUser.username }) });
    setStatus(`✅ Saved.`);
    showToast("Synced!");
  } catch(e) { setStatus("❌ Error"); }
}

function renderData() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const filtered = rows[currentTab].filter(r => Object.values(r).some(v => v.toString().toLowerCase().includes(query)));
  
  const head = document.getElementById('table-head');
  const body = document.getElementById('table-body');
  const config = {
    pw: { labels: ['Action', '#', 'Company', 'Shj', 'User', 'Pass', 'Dubai'], keys: ['company', 'shj', 'user', 'password', 'note'] },
    dm: { labels: ['Action', '#', 'Product', 'Size', 'Country', 'Brand', 'Barcode'], keys: ['product', 'size', 'country', 'brand', 'barcode'] },
    import: { labels: ['Action', '#', 'Code', 'Description'], keys: ['name', 'desc'] },
    links: { labels: ['Action', '#', 'Title', 'URL'], keys: ['title', 'url'] }
  };
  
  head.innerHTML = `<tr>${config[currentTab].labels.map(l => `<th>${l}</th>`).join('')}</tr>`;
  body.innerHTML = filtered.map((r, i) => `
    <tr>
      <td>
        <button class="btn-del-sm" onclick="deleteEntry(${i})">🗑️</button>
        <button class="btn-edit-sm" onclick="editEntry(${i})">✏️</button>
      </td>
      <td>${i+1}</td>
      ${config[currentTab].keys.map(k => `<td>${r[k]} <button class="copy-btn-sm" onclick="copy('${r[k]}')">📋</button></td>`).join('')}
      <td><button class="card-copy-btn" onclick="copyCard(${i})">Card Copy</button></td>
    </tr>
  `).join('');

  const cardList = document.getElementById('card-list');
  cardList.innerHTML = filtered.map((r, i) => `
    <div class="data-card">
      <div class="card-header">
        <div style="display:flex;gap:5px;">
          <button class="btn-del-sm" onclick="deleteEntry(${i})">🗑️</button>
          <button class="btn-edit-sm" onclick="editEntry(${i})">✏️</button>
          <span>#${i+1}</span>
        </div>
        <button class="card-copy-btn" onclick="copyCard(${i})">Card Copy</button>
      </div>
      ${config[currentTab].keys.map((k, idx) => `
        <div class="card-row">
          <span class="card-label">${config[currentTab].labels[idx+2]}</span>
          <div class="card-value">
            <span>${r[k]}</span>
            <button class="copy-btn-sm" onclick="copy('${r[k]}')">📋</button>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function copy(txt) { if(!txt) return; navigator.clipboard.writeText(txt); showToast("Copied!"); }

function copyCard(idx) {
  const r = rows[currentTab][idx];
  let text = "";
  if(currentTab === 'pw') text = `Company: ${r.company}\nShj Code: ${r.shj}\nUser: ${r.user}\nPass: ${r.password}\nNote: ${r.note}`;
  else if(currentTab === 'dm') text = `Product: ${r.product}\nSize: ${r.size}\nCountry: ${r.country}\nBrand: ${r.brand}\nBarcode: ${r.barcode}`;
  else if(currentTab === 'import') text = `Code: ${r.name}\nDesc: ${r.desc}`;
  else if(currentTab === 'links') text = `Title: ${r.title}\nURL: ${r.url}`;
  
  navigator.clipboard.writeText(text);
  showToast("Card Copied!");
}

function setStatus(txt) { document.getElementById('status-text').innerText = txt; }
function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
function switchTab(t) { currentTab = t; document.querySelectorAll('.tab-btn-pro').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); renderData(); }
function openModal(id) {
  const fields = document.getElementById('add-form-fields'); fields.innerHTML = '';
  const config = {
    pw: { labels: ['Company', 'Shj Code', 'User', 'Password', 'Dubai Code'], keys: ['company', 'shj', 'user', 'password', 'note'] },
    dm: { labels: ['Product', 'Size', 'Country', 'Brand', 'Barcode'], keys: ['product', 'size', 'country', 'brand', 'barcode'] },
    import: { labels: ['Code', 'Description'], keys: ['name', 'desc'] },
    links: { labels: ['Title', 'URL'], keys: ['title', 'url'] }
  };
  const r = rows[currentTab][editingIdx] || {};
  config[currentTab].labels.forEach((l, i) => {
    const k = config[currentTab].keys[i];
    fields.innerHTML += `<div class="lf"><label>${l}</label><input type="text" id="f-${k}" value="${r[k]||''}"></div>`;
  });
  document.getElementById(id).style.display = 'flex';
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; editingIdx = -1; }
async function addEntry() {
  const config = { pw:['company','shj','user','password','note'], dm:['product','size','country','brand','barcode'], import:['name','desc'], links:['title','url'] };
  let newRow = {}; config[currentTab].forEach(k => { newRow[k] = document.getElementById(`f-${k}`).value.trim(); });
  if(editingIdx > -1) rows[currentTab][editingIdx] = newRow; else rows[currentTab].push(newRow);
  closeModal('add-modal'); renderData(); await saveToSheets();
}
function editEntry(i) { editingIdx = i; openModal('add-modal'); }
async function deleteEntry(i) { if(confirm("Delete?")) { rows[currentTab].splice(i, 1); renderData(); await saveToSheets(); } }
function exportToExcel() { const ws = XLSX.utils.json_to_sheet(rows[currentTab]); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, currentTab); XLSX.writeFile(wb, `TOS_${currentTab}.xlsx`); }
function togglePass(id) { const x = document.getElementById(id); x.type = x.type === "password" ? "text" : "password"; }
function handleLogout() { location.reload(); }
</script>
</body>
</html>
