<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>USER PW LIST V.26 - HYBRID PREMIUM</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
    --neon-blue: #00d4ff;
    --neon-green: #00ffcc;
    --neon-red: #ff3131;
    --neon-yellow: #ffcc00;
    --bg-dark: #000000;
    --panel-bg: #0a0a0a;
    --text-main: #ffffff;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif;background:var(--bg-dark);color:var(--text-main);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--bg-dark);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:var(--panel-bg);border:2px solid var(--neon-blue);border-radius:20px;padding:30px;text-align:center;max-width:400px;width:90%;}
.login-box h1{color:var(--neon-blue);font-size:1.4rem;margin-bottom:20px;}
.lf{margin-bottom:15px;text-align:left;}
.lf label{display:block;color:var(--neon-blue);font-size:0.75rem;font-weight:bold;margin-bottom:5px;}
.lf input{width:100%;padding:12px;border-radius:10px;border:2px solid var(--neon-blue);background:#000;color:var(--neon-blue);font-size:1rem;outline:none;}
.btn-login{width:100%;padding:14px;background:linear-gradient(90deg, var(--neon-blue), var(--neon-green));color:#000;border:none;border-radius:30px;font-size:1.1rem;font-weight:bold;cursor:pointer;margin-top:10px;}
.footer-neon{margin-top:20px;padding:12px;border:1px solid #fff;border-radius:15px;}
.footer-neon .line1, .footer-neon .line2{color:#fff !important;font-weight:bold;font-size:0.85rem;}

/* ── APP HEADER ── */
#app{display:none;flex-direction:column;height:100%;}
header{background:var(--panel-bg);padding:10px 15px;border-bottom:2px solid var(--neon-blue);display:flex;justify-content:space-between;align-items:center;}
.header-title{color:var(--neon-blue);font-weight:bold;font-size:1.1rem;display:flex;align-items:center;gap:10px;}
.header-title .by{color:var(--neon-green);font-size:0.75rem;border:1px solid var(--neon-green);padding:2px 10px;border-radius:15px;}
.user-info{color:var(--neon-green);font-size:0.85rem;font-weight:bold;margin-right:10px;}
.btn-logout-pro{background:var(--neon-red);color:#fff;border:none;padding:6px 15px;border-radius:20px;font-weight:bold;cursor:pointer;}

/* ── TOOLBAR ── */
.toolbar{background:#000;padding:10px 15px;display:flex;gap:10px;align-items:center;flex-wrap:nowrap;overflow-x:auto;border-bottom:1px solid rgba(0,212,255,0.1);}
.toolbar button{padding:8px 12px;border-radius:8px;border:1px solid #fff;background:#000;color:#fff;font-weight:bold;cursor:pointer;font-size:0.75rem;white-space:nowrap;}
.tab-group{display:flex;gap:5px;margin:0 auto;}
.tab-btn-pro{padding:8px 15px;border-radius:8px;border:1px solid var(--neon-blue);background:#000;color:var(--neon-blue);font-weight:bold;cursor:pointer;font-size:0.8rem;}
.tab-btn-pro.active{color:#fff;background:rgba(0,212,255,0.1);border-color:#fff;}

/* ── SEARCH & ADD ── */
.search-container{padding:15px;background:#000;display:flex;flex-direction:column;gap:10px;}
.btn-add-main{width:100%;padding:12px;background:#000;color:var(--neon-green);border:1px solid var(--neon-green);border-radius:25px;font-weight:bold;cursor:pointer;text-transform:uppercase;}
.search-wrapper{position:relative;width:100%;}
.search-wrapper input{width:100%;padding:12px 15px 12px 40px;border-radius:25px;border:1px solid var(--neon-blue);background:var(--panel-bg);color:#fff;font-size:1rem;outline:none;}
.search-wrapper::before{content:'🔍';position:absolute;left:15px;top:50%;transform:translateY(-50%);opacity:0.8;}

/* ── DATA VIEW ── */
.data-container{flex:1;overflow-y:auto;padding:10px;background:#000;}

/* TABLE (PC) */
.table-view{display:none;width:100%;border-collapse:collapse;background:var(--panel-bg);border-radius:10px;overflow:hidden;}
.table-view th{background:#111;color:var(--neon-blue);padding:12px;text-align:left;font-size:0.85rem;border-bottom:2px solid var(--neon-blue);text-transform:uppercase;}
.table-view td{padding:12px;border-bottom:1px solid #1a1a1a;font-size:0.95rem;color:#eee;vertical-align:middle;text-align:left;}

/* CARDS (MOBILE) */
.card-list{display:grid;grid-template-columns:1fr;gap:15px;}
.data-card{background:var(--panel-bg);border:1px solid #222;border-radius:15px;padding:15px;border-left:4px solid var(--neon-blue);text-align:left;}
.card-header{font-size:1.1rem;font-weight:bold;color:#fff;margin-bottom:10px;border-bottom:1px solid #222;padding-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.card-label{color:var(--neon-blue);font-weight:bold;font-size:0.75rem;text-transform:uppercase;}
.card-value{color:#eee;font-weight:500;display:flex;align-items:center;gap:8px;max-width:70%;}

/* ── BUTTONS & COLORS ── */
.btn-edit-pro{background:var(--neon-blue) !important;color:#000 !important;border:none;padding:5px 10px;border-radius:5px;font-weight:bold;cursor:pointer;font-size:0.75rem;}
.btn-del-pro{background:var(--neon-red) !important;color:#fff !important;border:none;padding:5px 10px;border-radius:5px;font-weight:bold;cursor:pointer;font-size:0.75rem;}
.copy-btn-sm{background:transparent;border:1px solid var(--neon-blue);color:var(--neon-blue);padding:3px 6px;border-radius:4px;font-size:0.7rem;cursor:pointer;}
.card-copy-btn{background:var(--neon-green) !important;color:#000 !important;font-weight:bold;padding:5px 12px;border-radius:15px;font-size:0.75rem;border:none;cursor:pointer;}

/* LINK SECTION SPECIFIC */
.link-title-bold{color:var(--neon-green) !important;font-weight:bold !important;font-size:1.05rem;}
.link-url-bold{color:var(--neon-blue) !important;font-weight:bold !important;text-decoration:underline;}

/* ── MEDIA QUERIES ── */
@media (min-width: 1024px) {
    .search-container{flex-direction:row;padding:20px 25px;}
    .btn-add-main{width:auto;padding:14px 30px;}
    .table-view{display:table;}
    .card-list{display:none;}
    .toolbar{padding:15px 25px;overflow-x:visible;}
    .tab-btn-pro{padding:12px 25px;}
}

#status-bar{padding:8px 15px;background:var(--panel-bg);border-bottom:1px solid rgba(0,212,255,0.1);font-size:0.85rem;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--neon-blue);color:#000;padding:12px 25px;border-radius:25px;display:none;z-index:2000;font-weight:bold;}
.modal-content{width:95%;padding:25px;background:var(--panel-bg);border:2px solid var(--neon-blue);border-radius:15px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>🔐 USER PW LIST V.1</h1>
    <div id="login-err" style="color:var(--neon-red);margin-bottom:10px;font-weight:bold;"></div>
    <div class="lf"><label>USERNAME</label><input type="text" id="l-user" autocomplete="on"></div>
    <div class="lf">
      <label>PASSWORD</label>
      <div style="position:relative">
        <input type="password" id="l-pass">
        <button onclick="togglePass('l-pass')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--neon-blue);cursor:pointer;font-size:1.2rem;">👁️</button>
      </div>
    </div>
    <button class="btn-login" onclick="handleLogin()">LOGIN NOW</button>
    <div class="footer-neon"><div class="line1">SEA SHIPPING LLC</div><div class="line2">Release-July 2026</div></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-title">🔐 USER PW LIST V.1 <span class="by">By-Idris Mansoor</span></div>
    <div class="header-right" style="display:flex;align-items:center;">
      <span class="user-info" id="display-user"></span>
      <button class="btn-logout-pro" onclick="handleLogout()">Logout</button>
    </div>
  </header>

  <div class="toolbar">
    <button onclick="exportToExcel()">📤 Export</button>
    <button onclick="importFromExcel()">📥 Import</button>
    <button onclick="loadFromSheets()">🔄 Sync</button>
    <button onclick="cleanDuplicates()" style="border-color:var(--neon-green);color:var(--neon-green);">🧹 Clean</button>
    <div class="tab-group">
      <button class="tab-btn-pro active" onclick="switchTab('pw')">PW</button>
      <button class="tab-btn-pro" onclick="switchTab('dm')">DM</button>
      <button class="tab-btn-pro" onclick="switchTab('import')">IMP</button>
      <button class="tab-btn-pro" onclick="switchTab('links')">LINK</button>
    </div>
  </div>

  <div id="status-bar"><div id="status-text">⏳ System Ready</div></div>

  <div class="search-container">
    <button class="btn-add-main" onclick="openModal('add-modal')">➕ Add New</button>
    <div class="search-wrapper"><input type="text" id="search-input" placeholder="Search..." oninput="renderData()"></div>
  </div>

  <div class="data-container">
    <table class="table-view" id="data-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="card-list" id="card-list"></div>
  </div>
</div>

<div id="add-modal" class="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center;">
  <div class="modal-content">
    <h3 id="modal-title" style="color:var(--neon-blue);margin-bottom:15px;">Add Entry</h3>
    <div id="add-form-fields"></div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button style="flex:1;padding:12px;background:var(--neon-green);color:#000;border:none;border-radius:10px;font-weight:bold;" onclick="addEntry()">Save</button>
      <button style="flex:1;padding:12px;background:#333;color:#fff;border:none;border-radius:10px;font-weight:bold;" onclick="closeModal('add-modal')">Cancel</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".xlsx,.xls" style="display:none;" onchange="handleFileImport(event)">
<div id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzPPK40EUUUVrR9Ucm-TKnlaDYU47ipW3cYjeHT2PgJhHIxlGtjbDe3661rjJGi7Fcxnw/exec";
let rows = { pw: [], dm: [], import: [], links: [] };
let filteredData = [];
let currentUser = null;
let currentTab = 'pw';
let editingIdx = -1;

window.onload = () => {
  const savedUser = localStorage.getItem('tos_user_login');
  if(savedUser) document.getElementById('l-user').value = savedUser;
};

async function handleLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value.trim();
  if(!u || !p) return;
  try {
    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: u, password: p }) });
    const result = await res.json();
    if(result.success) {
      currentUser = result.user;
      localStorage.setItem('tos_user_login', u);
      document.getElementById('display-user').innerText = "👤 " + currentUser.username.toUpperCase();
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      loadFromSheets();
    } else { document.getElementById('login-err').innerText = "❌ " + result.error; }
  } catch(e) { alert("Error"); }
}

async function loadFromSheets() {
  setStatus("⏳ Loading...");
  try {
    const res = await fetch(API_URL);
    rows = await res.json();
    renderData();
    setStatus(`✅ Loaded ${rows[currentTab].length} entries.`);
  } catch(e) { setStatus("❌ Error"); }
}

async function saveToSheets() {
  setStatus("⏳ Saving...");
  try {
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'save', rows: rows, username: currentUser.username }) });
    setStatus(`✅ Saved.`);
    showToast("Synced!");
  } catch(e) { setStatus("❌ Error"); }
}

function renderData() {
  const query = document.getElementById('search-input').value.toLowerCase();
  filteredData = rows[currentTab].filter(r => Object.values(r).some(v => v.toString().toLowerCase().includes(query)));
  
  const head = document.getElementById('table-head');
  const body = document.getElementById('table-body');
  const config = {
    pw: { labels: ['#', 'Company', 'Shj', 'User', 'Pass', 'Dubai', 'Action'], keys: ['company', 'shj', 'user', 'password', 'note'] },
    dm: { labels: ['#', 'Product', 'Size', 'Country', 'Brand', 'Barcode', 'Action'], keys: ['product', 'size', 'country', 'brand', 'barcode'] },
    import: { labels: ['#', 'Code', 'Description', 'Action'], keys: ['name', 'desc'] },
    links: { labels: ['#', 'Title', 'URL', 'Action'], keys: ['title', 'url'] }
  };
  
  head.innerHTML = `<tr>${config[currentTab].labels.map(l => `<th>${l}</th>`).join('')}<th>Copy</th></tr>`;
  body.innerHTML = filteredData.map((r, i) => `
    <tr>
      <td>${i+1}</td>
      ${config[currentTab].keys.map(k => {
        let cls = "";
        if(currentTab === 'links' && k === 'title') cls = "link-title-bold";
        if(currentTab === 'links' && k === 'url') cls = "link-url-bold";
        return `<td class="${cls}">${r[k]} <button class="copy-btn-sm" onclick="copy('${r[k]}')">📋</button></td>`;
      }).join('')}
      <td>
        <button class="btn-edit-pro" onclick="editEntry(${i})">✏️ Edit</button>
        <button class="btn-del-pro" onclick="deleteEntry(${i})">🗑️ Del</button>
      </td>
      <td><button class="card-copy-btn" onclick="copyCard(${i})">Card Copy</button></td>
    </tr>
  `).join('');

  const cardList = document.getElementById('card-list');
  cardList.innerHTML = filteredData.map((r, i) => `
    <div class="data-card">
      <div class="card-header">
        <span>#${i+1} ${r.company || r.product || r.name || r.title || 'Entry'}</span>
        <button class="card-copy-btn" onclick="copyCard(${i})">Card Copy</button>
      </div>
      ${config[currentTab].keys.map((k, idx) => {
        let cls = "";
        if(currentTab === 'links' && k === 'title') cls = "link-title-bold";
        if(currentTab === 'links' && k === 'url') cls = "link-url-bold";
        return `
          <div class="card-row">
            <span class="card-label">${config[currentTab].labels[idx+1]}</span>
            <div class="card-value ${cls}">
              <span>${r[k]}</span>
              <button class="copy-btn-sm" onclick="copy('${r[k]}')">📋</button>
            </div>
          </div>
        `;
      }).join('')}
      <div style="display:flex;gap:10px;margin-top:10px;border-top:1px solid #222;padding-top:10px;">
        <button class="btn-edit-pro" style="flex:1" onclick="editEntry(${i})">EDIT</button>
        <button class="btn-del-pro" style="flex:1" onclick="deleteEntry(${i})">DELETE</button>
      </div>
    </div>
  `).join('');
}

function copy(txt) { if(!txt) return; navigator.clipboard.writeText(txt); showToast("Copied!"); }

function copyCard(idx) {
  const r = filteredData[idx];
  if(!r) return;
  let text = "";
  if(currentTab === 'pw') text = `Company: ${r.company}\nShj Code: ${r.shj}\nUser: ${r.user}\nPass: ${r.password}\nNote: ${r.note}`;
  else if(currentTab === 'dm') text = `Product: ${r.product}\nSize: ${r.size}\nCountry: ${r.country}\nBrand: ${r.brand}\nBarcode: ${r.barcode}`;
  else if(currentTab === 'import') text = `Code: ${r.name}\nDesc: ${r.desc}`;
  else if(currentTab === 'links') text = `Title: ${r.title}\nURL: ${r.url}`;
  navigator.clipboard.writeText(text);
  showToast("Card Copied!");
}

function cleanDuplicates() {
  const initialCount = rows[currentTab].length;
  const unique = [];
  const seen = new Set();
  rows[currentTab].forEach(item => {
    const val = JSON.stringify(item);
    if(!seen.has(val)) { seen.add(val); unique.push(item); }
  });
  rows[currentTab] = unique;
  renderData();
  const cleaned = initialCount - unique.length;
  showToast(cleaned > 0 ? `${cleaned} duplicates removed!` : "No duplicates found.");
  if(cleaned > 0) saveToSheets();
}

function setStatus(txt) { document.getElementById('status-text').innerText = txt; }
function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
function switchTab(t) { currentTab = t; document.querySelectorAll('.tab-btn-pro').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); renderData(); }
function openModal(id) {
  const fields = document.getElementById('add-form-fields'); fields.innerHTML = '';
  const config = {
    pw: { labels: ['Company', 'Shj Code', 'User', 'Password', 'Dubai Code'], keys: ['company', 'shj', 'user', 'password', 'note'] },
    dm: { labels: ['Product', 'Size', 'Country', 'Brand', 'Barcode'], keys: ['product', 'size', 'country', 'brand', 'barcode'] },
    import: { labels: ['Code', 'Description'], keys: ['name', 'desc'] },
    links: { labels: ['Title', 'URL'], keys: ['title', 'url'] }
  };
  const r = filteredData[editingIdx] || {};
  config[currentTab].labels.forEach((l, i) => {
    const k = config[currentTab].keys[i];
    fields.innerHTML += `<div class="lf"><label>${l}</label><input type="text" id="f-${k}" value="${r[k]||''}"></div>`;
  });
  document.getElementById(id).style.display = 'flex';
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; editingIdx = -1; }
async function addEntry() {
  const config = { pw:['company','shj','user','password','note'], dm:['product','size','country','brand','barcode'], import:['name','desc'], links:['title','url'] };
  let newRow = {}; config[currentTab].forEach(k => { newRow[k] = document.getElementById(`f-${k}`).value.trim(); });
  if(editingIdx > -1) {
    const realIdx = rows[currentTab].indexOf(filteredData[editingIdx]);
    rows[currentTab][realIdx] = newRow;
  } else { rows[currentTab].push(newRow); }
  closeModal('add-modal'); renderData(); await saveToSheets();
}
function editEntry(i) { editingIdx = i; openModal('add-modal'); }
async function deleteEntry(i) { 
  if(confirm("Delete this entry?")) { 
    const realIdx = rows[currentTab].indexOf(filteredData[i]);
    rows[currentTab].splice(realIdx, 1); 
    renderData(); await saveToSheets(); 
  } 
}
function exportToExcel() { const ws = XLSX.utils.json_to_sheet(rows[currentTab]); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, currentTab); XLSX.writeFile(wb, `TOS_${currentTab.toUpperCase()}.xlsx`); }
function togglePass(id) { const x = document.getElementById(id); x.type = x.type === "password" ? "text" : "password"; }
function handleLogout() { location.reload(); }
</script>
</body>
</html>
